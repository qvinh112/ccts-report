<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Báo cáo vận hành CCTS — Daily · Weekly · Long-term</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="reports_data.js"></script>
<style>
:root{
  --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7;
  --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--grid);
  padding:10px 18px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
header h1{font-size:17px;margin:0}
.seg{display:inline-flex;border:1px solid var(--axis);border-radius:8px;overflow:hidden}
.seg button{border:0;background:transparent;padding:7px 18px;cursor:pointer;font-weight:600;color:var(--ink2);font-size:13.5px}
.seg button.on{background:var(--s1);color:#fff}
.meta{margin-left:auto;font-size:12px;color:var(--muted);text-align:right}
main{max-width:1360px;margin:0 auto;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:8px}
.kpi{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:12px 14px}
.kpi .lbl{font-size:12px;color:var(--muted)}
.kpi .val{font-size:25px;font-weight:700;margin-top:2px}
.kpi .sub{font-size:11.5px;color:var(--ink2);margin-top:3px}
.dlt{font-weight:700;font-size:12px;padding:0 6px;border-radius:99px;display:inline-block}
.up{color:#0a7a0a}.down{color:#c22}.hl{outline:2px solid var(--crit);outline-offset:1px}
section{margin:20px 0;scroll-margin-top:60px}
h2{font-size:15px;border-left:4px solid var(--s1);padding-left:8px;margin:0 0 10px;display:flex;align-items:center;gap:8px}
h2 .n{color:var(--muted);font-size:12px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:12px 14px;min-width:0}
.card h3{margin:0 0 10px;font-size:13px;color:var(--ink2)}
.cv{position:relative;height:230px}
table{border-collapse:collapse;width:100%;font-size:12.6px}
th,td{padding:5px 8px;border-bottom:1px solid var(--grid);text-align:right;white-space:nowrap}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
th:first-child,td:first-child{text-align:left}
td.l{text-align:left;white-space:normal}
.tblwrap{overflow-x:auto}
.bar{display:flex;align-items:center;gap:8px;margin:3px 0}
.bar .bl{flex:0 0 auto;min-width:0;font-size:12.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:52%}
.bar .bt{flex:1;height:16px;background:var(--page);border-radius:5px;overflow:hidden}
.bar .bf{height:100%;background:var(--s1);border-radius:5px}
.bar .bv{flex:0 0 auto;font-weight:700;font-size:12px;min-width:44px;text-align:right}
.badge{display:inline-block;min-width:48px;text-align:center;padding:1px 8px;border-radius:99px;font-weight:700;font-size:12px;color:#fff}
.b-good{background:var(--good)}.b-warn{background:var(--warn);color:#3a2c00}.b-serious{background:var(--serious);color:#4b1a05}.b-crit{background:var(--crit)}
.ins{background:#f0f6ff;border:1px solid #cfe0f7;border-radius:12px;padding:12px 16px}
.ins h3{margin:0 0 6px;font-size:13.5px;color:var(--s1)}
.ins ul{margin:0;padding-left:20px}.ins li{margin:5px 0}
.qtile{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.qt{background:var(--surface);border:1px solid var(--ring);border-radius:10px;padding:10px 12px}
.qt .v{font-size:22px;font-weight:700}.qt .k{font-size:11.5px;color:var(--muted)}
.qt.warn{background:#fff8e6;border-color:#f0dfa8}.qt.crit{background:#fdeaea;border-color:#f2c4c4}
.tag{font-size:11px;color:#7a5c00;background:#fff4d1;border:1px solid #f0d98a;border-radius:5px;padding:1px 7px}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:11.8px}
.foot{color:var(--muted);font-size:11.5px;text-align:center;margin:26px 0 10px}
.hide{display:none}
.pill{font-size:11px;padding:1px 8px;border-radius:99px;background:var(--page);border:1px solid var(--grid);color:var(--ink2)}
</style>
</head>
<body>
<header>
  <h1>📊 Báo cáo vận hành CCTS</h1>
  <a href="index.html" class="pill" style="text-decoration:none">← Báo cáo tuần W29</a>
  <div class="seg" id="tabs">
    <button data-t="daily" class="on">Daily</button>
    <button data-t="weekly">Weekly</button>
    <button data-t="longterm">Long-term</button>
  </div>
  <div class="meta" id="meta"></div>
</header>
<main>
  <div id="daily"></div>
  <div id="weekly" class="hide"></div>
  <div id="longterm" class="hide"></div>
  <div class="foot" id="foot"></div>
</main>
<script>
const R = window.REPORTS || {};
const charts = [];
const fmt = n => (n==null?'—':Number(n).toLocaleString('vi-VN'));
const usd = n => '$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const PAL = ['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function slaBadge(pct){let c='b-good';if(pct>=40)c='b-crit';else if(pct>=25)c='b-serious';else if(pct>=15)c='b-warn';return `<span class="badge ${c}">${pct}%</span>`;}
function delta(v,label){if(v==null)return '';const big=Math.abs(v)>=20;const cls=v>=0?'up':'down';const arrow=v>=0?'▲':'▼';return ` <span class="dlt ${cls} ${big?'hl':''}">${arrow}${Math.abs(v)}%<span style="font-weight:400;color:var(--muted)"> ${label}</span></span>`;}
function kpi(lbl,val,sub){return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;}
function barList(rows,opt={}){if(!rows||!rows.length)return '<div style="color:var(--muted);font-size:12px">— không có dữ liệu —</div>';const max=Math.max(...rows.map(r=>+r[1]))||1;const col=opt.color||'var(--s1)';const suf=opt.suffix||'';const money=opt.money;return rows.map(r=>`<div class="bar"><div class="bl" title="${esc(r[0])}">${esc(r[0])}</div><div class="bt"><div class="bf" style="width:${(+r[1]/max*100).toFixed(1)}%;background:${col}"></div></div><div class="bv">${money?usd(r[1]):fmt(r[1])+suf}</div></div>`).join('');}
function tbl(head,rows){return `<div class="tblwrap"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td${i==0?' class="l"':''}>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function idList(rows,cols){if(!rows||!rows.length)return '<div style="color:var(--muted);font-size:12px">— không có —</div>';return tbl(cols,rows.map(r=>[`<span class="mono">${esc(r[0])}</span>`,...r.slice(1).map(esc)]));}
function card(title,body){return `<div class="card"><h3>${title}</h3>${body}</div>`;}
function sec(id,n,title,body){return `<section id="${id}"><h2><span class="n">${n}</span> ${title}</h2>${body}</section>`;}
function insights(list){if(!list||!list.length)return '';return `<div class="ins"><h3>💡 AI Insight</h3><ul>${list.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;charts.push(new Chart(el,cfg));}
const lineCfg=(labels,data,color,label)=>({type:'line',data:{labels,datasets:[{label,data,borderColor:color,backgroundColor:color+'22',fill:true,tension:.3,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},maintainAspectRatio:false}});
const doughCfg=(labels,data)=>({type:'doughnut',data:{labels,datasets:[{data,backgroundColor:PAL}]},options:{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}},maintainAspectRatio:false}});

/* ---------------- DAILY ---------------- */
function renderDaily(){
  const d=R.daily;if(!d){return '<p>Không có dữ liệu.</p>';}
  const k=d.kpi,cp=d.chg_prev,ca=d.chg_avg7;
  const kc=(lbl,key,extra)=>kpi(lbl,fmt(k[key]),`${delta(cp[key],'vs hôm qua')}${extra||''}`);
  let h='';
  // 1 Executive Summary
  h+=sec('d-exec','1','Executive Summary — '+d.day+' (so với '+d.prev+' & TB 7 ngày)',
    `<div class="kpis">
      ${kc('Ticket phát sinh','new')}
      ${kc('Đóng trong ngày','closed')}
      ${kpi('Đang Open',fmt(k.open),delta(cp.open,'vs hôm qua'))}
      ${kpi('Đang Pending',fmt(k.pending),delta(cp.pending,'vs hôm qua'))}
      ${kpi('Reopen',fmt(k.reopen),delta(cp.reopen,'vs hôm qua'))}
      ${kpi('Reject',fmt(k.reject),'')}
      ${kpi('Quá SLA (mới)',fmt(k.overdue_new),'ticket tạo hôm nay đã trễ')}
      ${kpi('Đúng SLA (mới)',fmt(k.ontime_new),'')}
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">TB 7 ngày: phát sinh ${d.kpi_avg7.new}/ngày · đóng ${d.kpi_avg7.closed}/ngày · reopen ${d.kpi_avg7.reopen}/ngày. <span class="tag">Chênh &gt;20% được tô đỏ</span></div>`);
  // 2 Ticket Trend
  h+=sec('d-trend','2','Ticket Trend',
    `<div class="grid2">${card('Theo giờ (ticket tạo)','<div class="cv"><canvas id="dHour"></canvas></div>')}
      ${card('Theo phân loại lỗi','<div class="cv"><canvas id="dClass"></canvas></div>')}</div>
     <div class="grid3" style="margin-top:12px">
      ${card('Top Station',barList(d.by_station))}
      ${card('Top Region',barList(d.by_region,{color:'var(--s5)'}))}
      ${card('Top Error Code',barList(d.by_error,{color:'var(--s6)'}))}</div>`);
  // 3 Operational Performance
  h+=sec('d-ops','3','Operational Performance',
    `<div class="grid3">
      ${card('Top Engineer (xử lý)',barList(d.top_engineer,{color:'var(--s2)'}))}
      ${card('Top Handling Code',barList(d.top_handling,{color:'var(--s3)'}))}
      ${card('Top Spare Part',barList(d.top_sparepart,{color:'var(--s8)'}))}</div>`);
  // 4 Quality Checking
  const q=d.qc;
  h+=sec('d-qc','4','Quality Checking',
    `<div class="qtile">
      <div class="qt ${q.miss_rca>0?'warn':''}"><div class="v">${fmt(q.miss_rca)}</div><div class="k">Thiếu RCA</div></div>
      <div class="qt ${q.miss_sol>0?'warn':''}"><div class="v">${fmt(q.miss_sol)}</div><div class="k">Thiếu Solution</div></div>
      <div class="qt ${q.miss_add>0?'warn':''}"><div class="v">${fmt(q.miss_add)}</div><div class="k">Thiếu Additional</div></div>
      <div class="qt ${q.need_appt_no_rec>0?'crit':''}"><div class="v">${fmt(q.need_appt_no_rec)}</div><div class="k">Cần hẹn, thiếu Appointment</div></div>
      <div class="qt ${q.parts_no_sol>0?'crit':''}"><div class="v">${fmt(q.parts_no_sol)}</div><div class="k">Có LK, thiếu Solution</div></div>
      <div class="qt"><div class="v">${q.avg_qc}</div><div class="k">Điểm QC TB /100</div></div>
    </div>`);
  // 5 Critical Ticket
  h+=sec('d-crit','5','Critical Ticket',
    `<div class="grid2">
      ${card('Ticket quá SLA ('+d.critical.overdue.length+')',idList(d.critical.overdue,['Ticket ID','Station','Error']))}
      ${card('Ticket Reopen ('+d.critical.reopen.length+')',idList(d.critical.reopen,['Ticket ID','Station','Số lần']))}</div>
     ${d.critical.high_sev.length?card('Severity cao',idList(d.critical.high_sev,['Ticket ID','Severity','Error'])):''}`);
  // 6 Abnormal
  const ab=d.abnormal;
  h+=sec('d-abn','6','Abnormal Detection',
    `<div class="qtile" style="margin-bottom:10px">
      <div class="qt ${ab.duplicate>0?'warn':''}"><div class="v">${fmt(ab.duplicate)}</div><div class="k">Ticket nghi trùng (CP+Error)</div></div>
      <div class="qt ${ab.station_spike.length?'crit':''}"><div class="v">${ab.station_spike.length}</div><div class="k">Station tăng đột biến</div></div>
      <div class="qt ${ab.error_spike.length?'crit':''}"><div class="v">${ab.error_spike.length}</div><div class="k">Error Code tăng đột biến</div></div>
    </div>
    <div class="grid3">
      ${card('Station tăng đột biến',ab.station_spike.length?tbl(['Station','Hôm nay','TB 7 ngày'],ab.station_spike.map(x=>[x[0],x[1],x[2]])):'<div style="color:var(--muted);font-size:12px">— không —</div>')}
      ${card('Error tăng đột biến',ab.error_spike.length?tbl(['Error','Hôm nay','TB 7 ngày'],ab.error_spike.map(x=>[x[0],x[1],x[2]])):'<div style="color:var(--muted);font-size:12px">— không —</div>')}
      ${card('Ticket nghi trùng',idList(ab.dup_examples,['Ticket ID','Charge Point','Error']))}</div>`);
  // 7 Insight
  h+=sec('d-ins','7','Daily Insight',insights(R.insights&&R.insights.daily));
  return h;
}
function chartsDaily(){
  const d=R.daily;
  mkChart('dHour',lineCfg(d.by_hour.map(x=>x[0]+'h'),d.by_hour.map(x=>x[1]),'#2a78d6','Ticket'));
  mkChart('dClass',doughCfg(d.by_class.map(x=>x[0]),d.by_class.map(x=>x[1])));
}

/* ---------------- WEEKLY ---------------- */
function renderWeekly(){
  const w=R.weekly;if(!w)return '<p>Không có dữ liệu.</p>';
  const k=w.kpi,p=w.kpi_prev;
  const dv=(a,b)=>b?Math.round((a-b)/b*1000)/10:null;
  let h='';
  // 1 KPI
  h+=sec('w-kpi','1','Weekly KPI — '+w.week+' (so với '+w.prev+')',
    `<div class="kpis">
      ${kpi('Tổng ticket',fmt(k.total),delta(dv(k.total,p.total),'vs '+w.prev))}
      ${kpi('Đóng',fmt(k.closed),'')}
      ${kpi('Pending',fmt(k.pending),delta(dv(k.pending,p.pending),''))}
      ${kpi('Reopen',fmt(k.reopen),delta(dv(k.reopen,p.reopen),''))}
      ${kpi('Reject',fmt(k.reject),'')}
      ${kpi('Quá SLA',slaBadge(k.overdue_pct),'tuần trước '+p.overdue_pct+'%')}
      ${kpi('Chi phí LK',usd(k.spare_cost),delta(dv(k.spare_cost,p.spare_cost),''))}
      ${kpi('Điểm QC TB',k.avg_qc,'tuần trước '+p.avg_qc)}
    </div>
    ${card('Xu hướng 4 tuần','<div class="cv"><canvas id="wTrend"></canvas></div>')}`);
  // 2 Volume
  h+=sec('w-vol','2','Ticket Volume',
    `<div class="grid2">${card('Theo ngày','<div class="cv"><canvas id="wDay"></canvas></div>')}
      ${card('Theo Region',barList(w.vol_by_region,{color:'var(--s5)'}))}</div>
     <div class="grid3" style="margin-top:12px">
      ${card('Top Station',barList(w.vol_by_station))}
      ${card('Top Error Code',barList(w.vol_by_error,{color:'var(--s6)'}))}
      ${card('Top Processor',barList(w.vol_by_processor,{color:'var(--s2)'}))}</div>`);
  // 3 SLA
  h+=sec('w-sla','3','SLA Analysis',
    `<div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
      ${kpi('Đạt SLA',w.sla.ontime_pct+'%','')}
      ${kpi('Quá SLA',slaBadge(w.sla.overdue_pct),'')}
    </div>
    <div class="grid3">
      ${card('Quá hạn theo Region',tbl(['Region','Overdue %','n'],w.sla.overdue_by_region.map(x=>[x[0],slaBadge(x[1]),x[2]])))}
      ${card('Station quá hạn nhiều nhất',tbl(['Station','Overdue','Tổng'],w.sla.overdue_by_station.map(x=>[x[0],x[1],x[2]])))}
      ${card('Engineer quá hạn nhiều nhất',tbl(['Engineer','Overdue','Tổng'],w.sla.overdue_by_engineer.map(x=>[x[0],x[1],x[2]])))}</div>`);
  // 4 RCA
  h+=sec('w-rca','4','RCA Analysis',
    `<div class="grid2">${card('Phân loại lỗi','<div class="cv"><canvas id="wClass"></canvas></div>')}
      ${card('Nguyên nhân Miễn trừ (Disclaim)',barList(w.rca.top_disclaim,{color:'var(--s3)'}))}</div>
     <div class="grid3" style="margin-top:12px">
      ${card('Top Handling Code',barList(w.rca.top_handling,{color:'var(--s3)'}))}
      ${card('Top Repair Category',barList(w.rca.top_repcat,{color:'var(--s4)'}))}
      ${card('Top Material thay',barList(w.rca.top_material,{color:'var(--s8)'}))}</div>`);
  // 5 Quality Score
  h+=sec('w-q','5','Quality Score',
    `<div class="grid2">
      ${card('Phân bố điểm QC','<div class="cv"><canvas id="wQ"></canvas></div>')}
      ${card('Ticket điểm QC thấp nhất',idList(w.quality.worst,['Ticket ID','Điểm','Trạng thái']))}</div>
     <div style="font-size:12px;color:var(--muted);margin-top:6px">Điểm QC = 6 tiêu chí: đủ Solution · RCA · Additional · phân loại rõ · đúng SLA · spare khớp handling.</div>`);
  // 6 Repeat
  h+=sec('w-rep','6','Repeat Issue',
    `<div class="grid3">
      ${card('Station lặp lỗi',barList(w.repeat.station,{color:'var(--s6)'}))}
      ${card('Charge Point lặp lỗi',barList(w.repeat.chargepoint,{color:'var(--s6)'}))}
      ${card('Error Code lặp',barList(w.repeat.error,{color:'var(--s6)'}))}</div>`);
  // 7 Cost
  h+=sec('w-cost','7','Cost Analysis',
    `<div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">${kpi('Tổng chi phí LK tuần',usd(w.cost.total),'')}</div>
     <div class="grid2">
      ${card('Chi phí theo Station',barList(w.cost.by_station,{money:true,color:'var(--s4)'}))}
      ${card('Chi phí theo Material',barList(w.cost.by_material,{money:true,color:'var(--s8)'}))}</div>
     <div class="grid2" style="margin-top:12px">
      ${card('Chi phí theo Region',barList(w.cost.by_region,{money:true,color:'var(--s5)'}))}
      ${card('Chi phí theo Error',barList(w.cost.by_error,{money:true,color:'var(--s6)'}))}</div>`);
  // 8 Insight
  h+=sec('w-ins','8','Weekly Insight',insights(R.insights&&R.insights.weekly));
  return h;
}
function chartsWeekly(){
  const w=R.weekly;
  const labs=w.kpi_by4.map(x=>x[0]);
  mkChart('wTrend',{type:'bar',data:{labels:labs,datasets:[
    {label:'Tổng ticket',data:w.kpi_by4.map(x=>x[1].total),backgroundColor:'#2a78d6'},
    {label:'Overdue %',data:w.kpi_by4.map(x=>x[1].overdue_pct),type:'line',borderColor:'#e34948',yAxisID:'y1',tension:.3}
  ]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true},y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false}}}}});
  mkChart('wDay',lineCfg(w.vol_by_day.map(x=>x[0].slice(5)),w.vol_by_day.map(x=>x[1]),'#2a78d6','Ticket'));
  mkChart('wClass',doughCfg(w.rca.top_class.map(x=>x[0]),w.rca.top_class.map(x=>x[1])));
  mkChart('wQ',{type:'bar',data:{labels:w.quality.dist.map(x=>x[0]+'-'+(x[0]+20)),datasets:[{data:w.quality.dist.map(x=>x[1]),backgroundColor:'#1baf7a'}]},options:{plugins:{legend:{display:false}},maintainAspectRatio:false}});
}

/* ---------------- LONG-TERM ---------------- */
function renderLong(){
  const L=R.longterm;if(!L)return '<p>Không có dữ liệu.</p>';
  const r=L.reliability;
  let h='';
  // 1 Trend
  h+=sec('l-trend','1','Trend (tuần & tháng)',
    `<div class="grid2">${card('Ticket & Overdue % theo tuần','<div class="cv"><canvas id="lWeek"></canvas></div>')}
      ${card('Chi phí linh kiện theo tuần','<div class="cv"><canvas id="lCost"></canvas></div>')}</div>
     ${card('Theo tháng',tbl(['Tháng','Tổng ticket','Đóng','Overdue %','Chi phí LK'],L.months.map(m=>[m.month,fmt(m.total),fmt(m.closed),slaBadge(m.overdue_pct),usd(m.cost)])))}`);
  // 2 Reliability
  h+=sec('l-rel','2','Reliability',
    `<div class="qtile">
      <div class="qt"><div class="v">${r.mtbf_days}</div><div class="k">MTBF (ngày) · median ${r.mtbf_median}</div></div>
      <div class="qt"><div class="v">${r.mttr_hours}h</div><div class="k">MTTR · median ${r.mttr_median}h</div></div>
      <div class="qt ${r.first_time_fix<80?'warn':''}"><div class="v">${r.first_time_fix}%</div><div class="k">First Time Fix</div></div>
      <div class="qt ${r.repeat_failure_rate>50?'warn':''}"><div class="v">${r.repeat_failure_rate}%</div><div class="k">Repeat Failure Rate</div></div>
      <div class="qt"><div class="v">${r.reopen_rate}%</div><div class="k">Reopen Rate</div></div>
      <div class="qt"><div class="v">${r.reject_rate}%</div><div class="k">Reject Rate</div></div>
      <div class="qt"><div class="v">${fmt(r.total_cp)}</div><div class="k">Điểm sạc theo dõi · ${r.window_days} ngày</div></div>
    </div>`);
  // 3 Failure Analysis
  h+=sec('l-fail','3','Failure Analysis (loại Disclaim)',
    `<div class="grid3">
      ${card('Top Error Code',barList(L.failure.top_error,{color:'var(--s6)'}))}
      ${card('Top Station',barList(L.failure.top_station))}
      ${card('Top Model',barList(L.failure.top_model,{color:'var(--s5)'}))}</div>
     <div class="grid2" style="margin-top:12px">
      ${card('Top Region',barList(L.failure.top_region,{color:'var(--s5)'}))}
      ${card('Top Material (linh kiện thay)',barList(L.failure.top_material,{color:'var(--s8)'}))}</div>`);
  // 4 Performance
  h+=sec('l-perf','4','Performance Ranking',
    `<div class="grid3">
      ${card('Engineer (Top khối lượng)',tbl(['Engineer','Ticket','Overdue%','QC'],L.performance.engineer.map(x=>[x[0],fmt(x[1]),slaBadge(x[2]),x[3]])))}
      ${card('Region',tbl(['Region','Ticket','Overdue%'],L.performance.region.map(x=>[x[0],fmt(x[1]),slaBadge(x[2])])))}
      ${card('Station (Top khối lượng)',tbl(['Station','Ticket','Overdue%'],L.performance.station.map(x=>[x[0],fmt(x[1]),slaBadge(x[2])])))}</div>`);
  // 5 Cost
  h+=sec('l-cost','5','Cost Analysis & Forecast',
    `<div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
      ${kpi('Tổng chi phí LK (luỹ kế)',usd(L.cost.total),'')}
      ${kpi('Dự báo tuần tới',L.cost.forecast.length?usd(L.cost.forecast[0]):'—','xu hướng tuyến tính')}
    </div>
    <div class="grid2">
      ${card('Chi phí theo tháng',tbl(['Tháng','Chi phí LK'],L.cost.by_month.map(x=>[x[0],usd(x[1])])))}
      ${card('Chi phí theo Material',barList(L.cost.by_material,{money:true,color:'var(--s8)'}))}</div>
    <div class="grid2" style="margin-top:12px">
      ${card('Chi phí theo Region',barList(L.cost.by_region,{money:true,color:'var(--s5)'}))}
      ${card('Dự báo chi phí 4 tuần tới',tbl(['Tuần tới','Dự báo'],L.cost.forecast.map((v,i)=>['+'+(i+1),usd(v)])))}</div>`);
  // 6 Predictive
  const P=L.predictive;
  h+=sec('l-pred','6','Predictive Analysis',
    `<div class="grid2">
      ${card('Station dễ phát sinh lỗi (đang tăng)',tbl(['Station','2 tuần gần','2 tuần trước'],P.rising_station.map(x=>[x[0],x[1],x[2]])))}
      ${card('Error Code sẽ tăng',tbl(['Error','2 tuần gần','2 tuần trước'],P.rising_error.map(x=>[x[0],x[1],x[2]])))}</div>
     <div class="grid2" style="margin-top:12px">
      ${card('Material tiêu hao nhanh (theo dõi tồn kho)',tbl(['Material','2 tuần','TB/tuần'],P.material_velocity.map(x=>[x[0],x[1],x[2]])))}
      ${card('Station cần Preventive Maintenance',tbl(['Station','Ticket','Chi phí','Overdue%'],P.need_pm.map(x=>[x[0],fmt(x[1]),usd(x[2]),slaBadge(x[3])])))}</div>
     <div style="font-size:12px;color:var(--muted);margin-top:6px">Dự đoán heuristic dựa trên xu hướng 2 tuần gần vs trước đó; "Material low" là tốc độ tiêu hao (chưa nối dữ liệu tồn kho thực).</div>`);
  // 7 Insight
  h+=sec('l-ins','7','Executive Insight',insights(R.insights&&R.insights.longterm));
  return h;
}
function chartsLong(){
  const L=R.longterm;
  const labs=L.weeks.map(x=>x.week);
  mkChart('lWeek',{type:'bar',data:{labels:labs,datasets:[
    {label:'Ticket',data:L.weeks.map(x=>x.total),backgroundColor:'#2a78d6'},
    {label:'Overdue %',data:L.weeks.map(x=>x.overdue_pct),type:'line',borderColor:'#e34948',yAxisID:'y1',tension:.3,pointRadius:2}
  ]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true},y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false}}}}});
  const fc=L.cost.forecast;const clabs=labs.concat(fc.map((_,i)=>'+'+(i+1)));
  const actual=L.weeks.map(x=>x.cost).concat(fc.map(()=>null));
  const fore=L.weeks.map(()=>null);const last=L.weeks.length?L.weeks[L.weeks.length-1].cost:0;
  fore[fore.length-1]=last;fc.forEach(v=>fore.push(v));
  mkChart('lCost',{type:'line',data:{labels:clabs,datasets:[
    {label:'Thực tế',data:actual,borderColor:'#008300',backgroundColor:'#00830022',fill:true,tension:.3,pointRadius:2},
    {label:'Dự báo',data:fore,borderColor:'#eda100',borderDash:[6,4],tension:.3,pointRadius:2}
  ]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}});
}

/* ---------------- tabs ---------------- */
function destroyCharts(){charts.forEach(c=>c.destroy());charts.length=0;}
let built={daily:false,weekly:false,longterm:false};
function show(tab){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));
  ['daily','weekly','longterm'].forEach(t=>document.getElementById(t).classList.toggle('hide',t!==tab));
  if(!built[tab]){
    const el=document.getElementById(tab);
    el.innerHTML = tab==='daily'?renderDaily():tab==='weekly'?renderWeekly():renderLong();
    built[tab]=true;
    if(tab==='daily')chartsDaily();else if(tab==='weekly')chartsWeekly();else chartsLong();
  }
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.t)show(e.target.dataset.t);});
const m=R.meta||{};
document.getElementById('meta').innerHTML=`Dữ liệu ${m.data_from} → ${m.data_to} · ${fmt(m.total_tickets)} ticket · ${fmt(m.total_cp)} điểm sạc<br>Cập nhật ${m.generated}`;
document.getElementById('foot').textContent='Báo cáo tự động từ CCTS · report_auto/reports.py · cập nhật hằng ngày lúc 06:20';
show('daily');
</script>
